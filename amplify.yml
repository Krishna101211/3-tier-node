version: 1
frontend:
  phases:
    build:
      commands:
        - if [ -n "$API_HOST" ]; then sed -i "s#http://localhost:3001/api/users#http://$API_HOST/api/users#g" frontend/public/index.html; fi
        - echo 'Build complete'
  artifacts:
    baseDirectory: frontend/public
    files:
      - '**/*'
  cache:
    paths: []
