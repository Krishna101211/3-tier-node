<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>User Registration</h1>
        <form id="registrationForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required minlength="3" maxlength="30" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="+1234567890">
            </div>
            <button type="submit">Register</button>
        </form>
        <div id="message" class="message"></div>

        <h2>Registered Users</h2>
        <button id="loadUsers" class="btn-secondary">Load Users</button>
        <div id="usersList"></div>
    </div>

    <script>
        const API_BASE = window.APP_CONFIG?.API_URL || 'http://localhost:3001/api/users';

        document.getElementById('registrationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = document.getElementById('message');
            const username = document.getElementById('username').value;
            const phone = document.getElementById('phone').value;

            try {
                const response = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, phone })
                });

                const data = await response.json();

                if (response.ok) {
                    message.textContent = 'Registration successful!';
                    message.className = 'message success';
                    document.getElementById('registrationForm').reset();
                    loadUsers();
                } else {
                    message.textContent = data.error || 'Registration failed';
                    message.className = 'message error';
                }
            } catch (error) {
                message.textContent = 'Network error. Please try again.';
                message.className = 'message error';
            }
        });

        async function loadUsers() {
            const usersList = document.getElementById('usersList');
            try {
                const response = await fetch(API_BASE);
                const data = await response.json();

                if (data.data && data.data.length > 0) {
                    usersList.innerHTML = data.data.map(user => `
                        <div class="user-card">
                            <strong>${user.username}</strong>
                            <span>${user.phone}</span>
                        </div>
                    `).join('');
                } else {
                    usersList.innerHTML = '<p>No users registered yet.</p>';
                }
            } catch (error) {
                usersList.innerHTML = '<p>Failed to load users.</p>';
            }
        }

        document.getElementById('loadUsers').addEventListener('click', loadUsers);
    </script>
</body>
</html>
